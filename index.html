<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Office Board</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="dashboard">
    <section class="hero panel"><div><div class="brand-title">OFFICE BOARD</div><div class="brand-subtitle">Доска нашего офиса</div></div><div class="logo-text">KAZAKHTELECOM<br/>CORPORATE UNIVERSITY</div></section>
    <section class="people" id="people"></section>
    <section class="today panel"><div class="today-label">Сегодня</div><div class="today-date" id="todayDate"></div></section>
    <section class="metrics" id="metrics"></section>
    <section class="legend panel" id="legend"></section>
    <section class="calendar-wrap panel"><div class="months" id="months"></div></section>
    <aside class="day-panel panel"><div class="panel-title" id="selectedDayTitle">Сегодня</div><div id="dayEvents"></div></aside>
    <section class="clock panel"><div class="time" id="clockTime">00:00</div><div class="date-line" id="clockDate"></div></section>
    <section class="important panel"><div class="panel-title">⭐ Важно на сегодня</div><div id="todayImportant"></div></section>
    <section class="notes panel"><div class="panel-title">✎ Заметки / планы / идеи</div><textarea id="notes" placeholder="Место для ваших заметок..."></textarea></section>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
